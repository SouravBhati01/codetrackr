<!DOCTYPE html>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a;
            color: #e8e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }
        .error-page { max-width: 480px; }
        .error-code {
            font-size: clamp(5rem, 15vw, 8rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(135deg, #00b8a3, #ffa116);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 16px;
        }
        .error-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .error-desc {
            color: rgba(255,255,255,0.45);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            background: #00b8a3;
            color: #0a0a1a;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .home-btn:hover { background: #00cdb5; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,184,163,0.3); }
        .home-btn:focus-visible { outline: 2px solid #ffa116; outline-offset: 3px; }
    </style>
</head>
<body>
    <main class="error-page" role="main">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back to tracking your coding progress.</p>
        <a href="/" class="home-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

    </main>
